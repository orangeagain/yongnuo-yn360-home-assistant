yongnuo_sunrise_two_hour_serial:
  alias: "Yongnuo sunrise two-hour serial"
  mode: restart
  sequence:
    - variables:
        total_rounds: 80
        min_kelvin: 2000
        max_kelvin: 10000
    - repeat:
        count: "{{ total_rounds }}"
        sequence:
          - variables:
              brightness_pct: >-
                {{ [1, ((repeat.index * 100 / total_rounds) | round(0, 'floor') | int)] | max }}
              color_temp_kelvin: >-
                {{ (min_kelvin + ((max_kelvin - min_kelvin) * repeat.index / total_rounds)) | round(0) | int }}
          - service: light.turn_on
            target:
              entity_id: light.yn360_led_video_light_d0_32_34_39_6d_6f
            data:
              brightness_pct: "{{ brightness_pct }}"
              color_temp_kelvin: "{{ color_temp_kelvin }}"
          - delay: "00:00:30"
          - service: light.turn_on
            target:
              entity_id: light.yn360_led_video_light_db_b9_85_86_42_60
            data:
              brightness_pct: "{{ brightness_pct }}"
              color_temp_kelvin: "{{ color_temp_kelvin }}"
          - delay: "00:00:30"
          - service: light.turn_on
            target:
              entity_id: light.yn360_led_video_light_d0_32_34_39_74_49
            data:
              brightness_pct: "{{ brightness_pct }}"
              color_temp_kelvin: "{{ color_temp_kelvin }}"
          - delay: "00:00:30"
